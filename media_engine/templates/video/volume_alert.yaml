template_id: volume_alert
name: Volume Alert
story_types: [volume, momentum]
target_min_duration: 30
target_max_duration: 50
fallback_template_id: three_things
scene_slots:
  - slot_id: hook
    card_type: hook_card
    narration_role: hook
    visual_style: green_momentum
    motion: punch_in
    caption_style: emphasis_caption
    required_fields: [ticker, headline]
    optional_fields: [company_name]
  - slot_id: volume
    card_type: volume_spike_card
    narration_role: volume
    visual_style: green_momentum
    motion: stat_reveal
    caption_style: emphasis_caption
    required_fields: [volume_ratio]
    optional_fields: [price_change_pct]
  - slot_id: price_move
    card_type: price_move_card
    narration_role: price_move
    visual_style: blue_gradient
    motion: stat_reveal
    caption_style: default_caption
    required_fields: [price_change_pct]
    optional_fields: [price]
  - slot_id: chart
    card_type: chart_card
    narration_role: chart
    visual_style: dark_grid
    motion: chart_pan
    caption_style: default_caption
    required_fields: []
    optional_fields: [chart_path]
  - slot_id: risk
    card_type: risk_card
    narration_role: risk
    visual_style: red_risk
    motion: warning_pulse
    caption_style: risk_caption
    required_fields: []
    optional_fields: [risk]
  - slot_id: outro
    card_type: outro_disclaimer_card
    narration_role: disclaimer
    visual_style: gray_outro
    motion: takeaway_hold
    caption_style: default_caption
    required_fields: [ticker]
    optional_fields: [as_of]
