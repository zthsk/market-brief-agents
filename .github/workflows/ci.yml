name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            remotion/package-lock.json
      - run: uv sync --extra dev --extra agent
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run python scripts/assert_public_clean.py
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm ci
        working-directory: remotion
      - run: npm run typecheck
        working-directory: remotion
